<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiftyshop - Preorden</title>
    <style>
        :root{--bg:#0a0a0a;--bg2:#1a1a1a;--bg3:#1e1e1e;--red:#8b0000;--red2:#b30000;--red3:#e60000;--tx:#e0e0e0;--tx2:#b0b0b0;--tx3:#808080;--bd:#2a0000;--inp:#111;--inpb:#3a0000;--ok:#0c6;--warn:#fa0}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);background-image:radial-gradient(ellipse at center,rgba(139,0,0,0.06) 0%,transparent 70%);color:var(--tx);min-height:100vh}
        .nav-top{background:var(--bg2);border-bottom:1px solid var(--bd);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
        .nav-top .logo-text{font-size:1.5em;font-weight:900;letter-spacing:3px;background:linear-gradient(180deg,#ff1a1a 0%,#b30000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:'Georgia',serif}
        .nav-links{display:flex;gap:12px;flex-wrap:wrap}
        .nav-links a{color:var(--tx2);text-decoration:none;padding:8px 16px;border-radius:6px;font-size:.85em;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:all .3s;border:1px solid transparent}
        .nav-links a:hover,.nav-links a.active{color:var(--red3);border-color:var(--red);background:rgba(139,0,0,0.1)}
        .container{max-width:600px;margin:0 auto;padding:20px}
        .card{background:var(--bg3);border:1px solid var(--bd);border-radius:16px;padding:30px;box-shadow:0 0 20px rgba(139,0,0,0.3);position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red2),var(--red3),var(--red2),transparent)}
        .section-title{font-size:1.3em;font-weight:700;margin-bottom:8px;text-align:center;letter-spacing:2px}
        .section-title span{color:var(--red3)}
        .producto-seleccionado{background:rgba(139,0,0,0.1);border:1px solid var(--bd);border-radius:10px;padding:15px;margin-bottom:20px;text-align:center}
        .producto-seleccionado .prod-nombre{font-weight:700;color:var(--tx)}
        .producto-seleccionado .prod-precio{color:var(--red3);font-weight:900;font-size:1.2em;margin-top:5px}
        .producto-seleccionado select{width:100%;padding:10px;background:var(--inp);border:1px solid var(--inpb);border-radius:8px;color:var(--tx);font-size:.9em;margin-top:10px;outline:none}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;margin-bottom:6px;font-size:.8em;font-weight:600;color:var(--tx2);letter-spacing:1px;text-transform:uppercase}
        .form-group input,.form-group textarea{width:100%;padding:12px 16px;background:var(--inp);border:1.5px solid var(--inpb);border-radius:8px;color:var(--tx);font-size:.95em;transition:all .3s;outline:none;font-family:inherit}
        .form-group input:focus,.form-group textarea:focus{border-color:var(--red);box-shadow:0 0 15px rgba(139,0,0,0.4),inset 0 0 10px rgba(139,0,0,0.1);background:#1a0a0a}
        .form-group textarea{resize:vertical;min-height:80px}
        .privacy-notice{background:rgba(139,0,0,0.1);border:1px solid rgba(139,0,0,0.3);border-radius:10px;padding:14px 16px;margin:20px 0;font-size:.78em;color:var(--tx3);text-align:center}
        .btn-submit{width:100%;padding:14px;background:linear-gradient(180deg,#c00,#8b0000);border:none;border-radius:10px;color:#fff;font-size:1em;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(139,0,0,0.4)}
        .btn-submit:hover{background:linear-gradient(180deg,#e60000,#a30000);box-shadow:0 6px 30px rgba(179,0,0,0.6)}
        .btn-submit:disabled{background:#333;cursor:not-allowed;box-shadow:none;color:#666}
        .notification{display:none;padding:16px;border-radius:10px;margin-top:16px;text-align:center;font-weight:600;animation:fadeIn .4s}
        .notification.success{display:block;background:rgba(0,204,102,0.15);border:1px solid rgba(0,204,102,0.4);color:#0c6}
        .notification.error{display:block;background:rgba(230,0,0,0.15);border:1px solid rgba(230,0,0,0.4);color:#e60000}
        .id-box{background:var(--inp);border:2px dashed var(--red3);border-radius:12px;padding:20px;margin-top:16px;text-align:center;display:none}
        .id-box .id-value{font-size:1.4em;font-weight:900;color:var(--red3);font-family:monospace;letter-spacing:2px}
        .id-box .id-warning{font-size:.7em;color:var(--warn);margin-top:8px}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:480px){.card{padding:20px 16px}}
    </style>
</head>
<body>
    <nav class="nav-top">
        <div class="logo-text">FIFTYS HOP</div>
        <div class="nav-links">
            <a href="index.html">Catálogo</a>
            <a href="preorden.html" class="active">Preordenar</a>
            <a href="reporte.html">Reportar</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3 class="section-title"><span>◆</span> Formulario de Preorden <span>◆</span></h3>
            
            <div class="producto-seleccionado">
                <label style="font-size:.75em;color:var(--tx3);text-transform:uppercase;letter-spacing:1px">Producto</label>
                <select id="productoSelect" onchange="actualizarProducto()">
                    <option value="">Selecciona un producto...</option>
                </select>
                <div class="prod-nombre" id="prodNombre" style="margin-top:8px"></div>
                <div class="prod-precio" id="prodPrecio"></div>
            </div>

            <form id="preordenForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ingresa tu nombre..." required>
                </div>
                <div class="form-group">
                    <label>Número de Teléfono</label>
                    <input type="tel" id="telefono" placeholder="+34 612 345 678" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="tucorreo@email.com" required>
                </div>
                <div class="form-group">
                    <label>Dirección de Envío (España)</label>
                    <textarea id="direccion" placeholder="Calle, número, ciudad, provincia, código postal..." required></textarea>
                </div>
                <div class="privacy-notice">🔒 Todos los datos están protegidos. No hay fuga de información. Envíos solo a España.</div>
                <button type="submit" class="btn-submit" id="submitBtn">Realizar Preorden</button>
            </form>
            <div id="notification" class="notification"></div>
            <div class="id-box" id="idBox">
                <div style="font-size:.7em;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">Tu ID de Reserva</div>
                <div class="id-value" id="idValue"></div>
                <div class="id-warning">⚠️ Guarda este ID para consultar el estado de tu pedido.</div>
            </div>
        </div>
    </div>

    <script>
        var TK='8904805084:AAGUj2dSJfFVmCPExt4Tt-kFSSGUpLEPp6E';
        var CID='7353460594';
        var productos=[];
        var productoSeleccionado=null;

        async function cargarProductos(){
            try{
                var r=await fetch('./productos.json');
                productos=await r.json();
                var sel=document.getElementById('productoSelect');
                productos.forEach(function(p){
                    var opt=document.createElement('option');
                    opt.value=p.id;opt.textContent=p.nombre+' - '+p.precio;
                    sel.appendChild(opt)
                });
                var url=new URL(window.location.href);
                var prodId=url.searchParams.get('prod');
                if(prodId){sel.value=prodId;actualizarProducto()}
            }catch(e){console.error(e)}
        }

        function actualizarProducto(){
            var id=document.getElementById('productoSelect').value;
            productoSeleccionado=productos.find(function(p){return p.id===id})||null;
            document.getElementById('prodNombre').textContent=productoSeleccionado?productoSeleccionado.nombre:'';
            document.getElementById('prodPrecio').textContent=productoSeleccionado?productoSeleccionado.precio:''
        }

        function showNotification(m,ty){
            var n=document.getElementById('notification');
            n.textContent=m;n.className='notification '+ty;
            setTimeout(function(){n.className='notification'},8000)
        }

        async function enviarATelegram(datos){
            var msg='🔴 *NUEVA PREORDEN - FIFTYSHOP* 🔴\n\n'+
                '🆔 *ID:* `'+datos.id+'`\n'+
                '📦 *Producto:* '+datos.producto+'\n'+
                '💰 *Precio:* '+datos.precio+'\n'+
                '📅 *Fecha:* '+new Date(datos.fecha).toLocaleString('es-ES')+'\n\n'+
                '👤 *Nombre:* '+datos.nombre+'\n'+
                '📱 *Teléfono:* '+datos.telefono+'\n'+
                '📧 *Correo:* '+datos.correo+'\n'+
                '📍 *Dirección:* '+datos.direccion+'\n\n'+
                '💳 *Estado:* PENDIENTE ⏳\n\n'+
                '📋 *JSON PARA ADMIN:*\n```json\n'+JSON.stringify(datos,null,2)+'\n```';
            try{
                var r=await fetch('https://api.telegram.org/bot'+TK+'/sendMessage',{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({chat_id:CID,text:msg,parse_mode:'Markdown'})
                });
                var j=await r.json();return j.ok
            }catch(e){return false}
        }

        async function handleSubmit(e){
            e.preventDefault();
            if(!productoSeleccionado){showNotification('Selecciona un producto.','error');return}
            var btn=document.getElementById('submitBtn');
            var orig=btn.textContent;
            btn.disabled=true;btn.textContent='ENVIANDO...';
            var datos={
                producto:productoSeleccionado.nombre,
                precio:productoSeleccionado.precio,
                productoId:productoSeleccionado.id,
                nombre:document.getElementById('nombre').value.trim(),
                telefono:document.getElementById('telefono').value.trim(),
                correo:document.getElementById('correo').value.trim(),
                direccion:document.getElementById('direccion').value.trim(),
                id:'ORD-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substring(2,6).toUpperCase(),
                fecha:new Date().toISOString(),
                estadoPago:'pendiente'
            };
            var enviado=await enviarATelegram(datos);
            showNotification(enviado?'✅ Preorden enviada. A la espera de pago.':'✅ Preorden registrada. A la espera de pago.','success');
            document.getElementById('idValue').textContent=datos.id;
            document.getElementById('idBox').style.display='block';
            document.getElementById('preordenForm').reset();
            btn.disabled=false;btn.textContent=orig
        }

        cargarProductos();
    </script>
</body>
</html>
