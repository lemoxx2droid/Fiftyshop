<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiftyshop - Panel Admin</title>
    <style>
        :root{--bg:#0a0a0a;--bg2:#1a1a1a;--bg3:#1e1e1e;--red:#8b0000;--red2:#b30000;--red3:#e60000;--tx:#e0e0e0;--tx2:#b0b0b0;--tx3:#808080;--bd:#2a0000;--inp:#111;--inpb:#3a0000;--ok:#0c6;--warn:#fa0;--err:#e60000}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);background-image:radial-gradient(ellipse at center,rgba(139,0,0,0.08) 0%,transparent 70%);color:var(--tx);min-height:100vh;padding:20px}
        .container{max-width:1400px;margin:0 auto}
        .header{text-align:center;margin-bottom:30px;padding:20px;border-bottom:2px solid var(--bd)}
        .header h1{font-size:2.5em;font-weight:900;letter-spacing:4px;background:linear-gradient(180deg,#ff1a1a,#b30000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:'Georgia',serif;margin-bottom:10px}
        .tabs{display:flex;gap:5px;margin-bottom:20px;flex-wrap:wrap}
        .tab-btn{padding:10px 20px;background:var(--bg2);border:1px solid var(--bd);color:var(--tx2);cursor:pointer;border-radius:8px 8px 0 0;font-weight:600;letter-spacing:1px;text-transform:uppercase;font-size:.8em}
        .tab-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .card{background:var(--bg3);border:1px solid var(--bd);border-radius:0 12px 12px 12px;padding:20px;margin-bottom:20px}
        .config-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:15px}
        .config-row label{font-size:.75em;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
        .config-row input,.config-row textarea,.config-row select{padding:10px;background:var(--inp);border:1px solid var(--inpb);border-radius:6px;color:var(--tx);font-size:.85em;min-width:200px;outline:none}
        .config-row textarea{resize:vertical;min-height:50px;width:100%}
        .btn{padding:8px 16px;border:none;border-radius:6px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-size:.8em}
        .btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red3)}
        .btn-green{background:var(--ok);color:#000}.btn-green:hover{background:#00e673}
        .btn-yellow{background:var(--warn);color:#000}
        .btn-del{background:var(--err);color:#fff}
        .btn-sm{padding:4px 8px;font-size:.7em}
        table{width:100%;border-collapse:collapse;font-size:.8em;margin-top:15px}
        th{background:rgba(139,0,0,0.2);padding:10px 8px;text-align:left;font-weight:700;color:var(--red3);font-size:.75em;text-transform:uppercase;white-space:nowrap}
        td{padding:8px;border-top:1px solid rgba(42,0,0,0.5)}
        .badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:.7em;font-weight:700;text-transform:uppercase}
        .badge-pendiente{background:rgba(255,170,0,0.2);color:#fa0}
        .badge-pagado{background:rgba(0,204,102,0.2);color:#0c6}
        .notification{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:10px;font-weight:600;z-index:2000;display:none}
        .notification.show{display:block}
        .notification.success{background:rgba(0,204,102,0.9);color:#000}
        .notification.error{background:rgba(230,0,0,0.9);color:#fff}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        @media(max-width:768px){table{font-size:.65em}th,td{padding:4px}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>FIFTYS HOP</h1><p style="color:var(--tx3)">PANEL DE ADMINISTRACIÓN</p></div>

        <div class="config-row">
            <div><label>Token GitHub</label><input type="password" id="githubToken" placeholder="ghp_..." style="width:250px"></div>
            <div><label>Repo</label><input type="text" id="repoName" value="lemoxx2droid/fiftyshop" style="width:200px"></div>
            <button class="btn btn-red" onclick="conectar()">🔗 Conectar</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('reservas')">📋 Reservas</button>
            <button class="tab-btn" onclick="switchTab('productos')">📦 Productos</button>
            <button class="tab-btn" onclick="switchTab('vendedores')">👤 Vendedores</button>
            <button class="tab-btn" onclick="switchTab('reportes')">⚠️ Reportes</button>
        </div>

        <!-- TAB RESERVAS -->
        <div class="tab-content active" id="tab-reservas">
            <div class="card">
                <h3 style="color:var(--red3);margin-bottom:10px">Agregar Reserva desde JSON</h3>
                <div class="config-row">
                    <textarea id="jsonReserva" placeholder='Pega el JSON de Telegram aquí...' style="flex:1;min-height:50px"></textarea>
                    <button class="btn btn-green" onclick="agregarReserva()">➕ Agregar</button>
                </div>
                <button class="btn btn-red" onclick="cargarReservas()" style="margin-top:10px">🔄 Refrescar</button>
                <table><thead><tr><th>ID</th><th>Fecha</th><th>Producto</th><th>Nombre</th><th>Teléfono</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="tbodyReservas"></tbody></table>
            </div>
        </div>

        <!-- TAB PRODUCTOS -->
        <div class="tab-content" id="tab-productos">
            <div class="card">
                <h3 style="color:var(--red3);margin-bottom:10px">Agregar Producto</h3>
                <div class="config-row">
                    <input type="text" id="prodNombre" placeholder="Nombre del producto">
                    <select id="prodCategoria"><option value="receta">Receta</option><option value="metodo">Método</option><option value="producto">Producto</option></select>
                    <input type="text" id="prodPrecio" placeholder="Precio (ej: 25€)">
                    <select id="prodVendedor"></select>
                </div>
                <div class="config-row"><textarea id="prodDescripcion" placeholder="Descripción del producto..." style="width:100%"></textarea></div>
                <button class="btn btn-green" onclick="agregarProducto()">➕ Agregar Producto</button>
                <button class="btn btn-red" onclick="cargarProductos()" style="margin-left:10px">🔄 Refrescar</button>
                <table style="margin-top:15px"><thead><tr><th>ID</th><th>Nombre</th><th>Cat</th><th>Precio</th><th>Vendedor</th><th>Activo</th><th>Acciones</th></tr></thead><tbody id="tbodyProductos"></tbody></table>
            </div>
        </div>

        <!-- TAB VENDEDORES -->
        <div class="tab-content" id="tab-vendedores">
            <div class="card">
                <h3 style="color:var(--red3);margin-bottom:10px">Agregar Vendedor</h3>
                <div class="config-row">
                    <input type="text" id="venNombre" placeholder="Nombre">
                    <input type="text" id="venAvatar" placeholder="Emoji (🧪)">
                    <input type="text" id="venValoracion" placeholder="Valoración (4.8)">
                </div>
                <div class="config-row"><textarea id="venDescripcion" placeholder="Descripción..." style="width:100%"></textarea></div>
                <button class="btn btn-green" onclick="agregarVendedor()">➕ Agregar Vendedor</button>
                <button class="btn btn-red" onclick="cargarVendedores()" style="margin-left:10px">🔄 Refrescar</button>
                <table style="margin-top:15px"><thead><tr><th>ID</th><th>Avatar</th><th>Nombre</th><th>Val.</th><th>Acciones</th></tr></thead><tbody id="tbodyVendedores"></tbody></table>
            </div>
        </div>

        <!-- TAB REPORTES -->
        <div class="tab-content" id="tab-reportes">
            <div class="card">
                <h3 style="color:var(--warn);margin-bottom:10px">Agregar Reporte desde JSON</h3>
                <div class="config-row">
                    <textarea id="jsonReporte" placeholder='Pega el JSON del reporte aquí...' style="flex:1;min-height:50px"></textarea>
                    <button class="btn btn-yellow" onclick="agregarReporte()">➕ Agregar</button>
                </div>
                <button class="btn btn-red" onclick="cargarReportes()" style="margin-top:10px">🔄 Refrescar</button>
                <table><thead><tr><th>ID</th><th>Fecha</th><th>Reserva</th><th>Nombre</th><th>Tipo</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="tbodyReportes"></tbody></table>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        var T='',API='',R=[],P=[],V=[],RP=[];

        function N(m,t){var n=document.getElementById('notification');n.textContent=m;n.className='notification show '+t;setTimeout(function(){n.className='notification'},4000)}

        function conectar(){
            T=document.getElementById('githubToken').value.trim();
            var repo=document.getElementById('repoName').value.trim();
            if(!T||!repo)return N('Llena los campos','error');
            cargarTodo()
        }

        async function ghRead(file){
            var url='https://api.github.com/repos/'+document.getElementById('repoName').value.trim()+'/contents/'+file;
            var r=await fetch(url,{headers:{'Authorization':'token '+T,'Accept':'application/vnd.github.v3+json'}});
            if(!r.ok){if(r.status===404)return{data:[],sha:null};throw new Error('Error '+r.status)}
            var d=await r.json();return{data:JSON.parse(atob(d.content)),sha:d.sha}
        }

        async function ghWrite(file,data,sha,msg){
            var url='https://api.github.com/repos/'+document.getElementById('repoName').value.trim()+'/contents/'+file;
            var c=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
            var b={message:msg,content:c};if(sha)b.sha=sha;
            var r=await fetch(url,{method:'PUT',headers:{'Authorization':'token '+T,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(b)});
            if(!r.ok)throw new Error('Error al guardar');
            var d=await r.json();return d.content.sha
        }

        async function cargarTodo(){
            try{
                var r1=await ghRead('reservas.json');R=r1.data;window._shaR=r1.sha;
                var r2=await ghRead('productos.json');P=r2.data;window._shaP=r2.sha;
                var r3=await ghRead('vendedores.json');V=r3.data;window._shaV=r3.sha;
                var r4=await ghRead('reportes.json');RP=r4.data;window._shaRP=r4.sha;
                renderReservas();renderProductos();renderVendedores();renderReportes();
                llenarSelectVendedores();N('✅ Todo cargado','success')
            }catch(e){N('Error: '+e.message,'error')}
        }

        function switchTab(t){
            document.querySelectorAll('.tab-content').forEach(function(tc){tc.classList.remove('active')});
            document.querySelectorAll('.tab-btn').forEach(function(tb){tb.classList.remove('active')});
            document.getElementById('tab-'+t).classList.add('active');
            event.target.classList.add('active')
        }

        // RESERVAS
        function renderReservas(){
            var tb=document.getElementById('tbodyReservas');tb.innerHTML='';
            if(!R.length){tb.innerHTML='<tr><td colspan="7">Vacío</td></tr>';return}
            [].concat(R).reverse().forEach(function(r,i){
                var ri=R.indexOf(r);
                tb.innerHTML+='<tr><td><code>'+r.id+'</code></td><td>'+new Date(r.fecha).toLocaleDateString()+'</td><td>'+(r.producto||'-')+'</td><td>'+r.nombre+'</td><td>'+r.telefono+'</td><td><span class="badge '+(r.estadoPago==='pagado'?'badge-pagado':'badge-pendiente')+'">'+r.estadoPago+'</span></td><td>'+
                    (r.estadoPago==='pendiente'?'<button class="btn btn-green btn-sm" onclick="cambiarEstadoR('+ri+')">✅</button> ':'')+
                    '<button class="btn btn-del btn-sm" onclick="eliminarR('+ri+')">🗑️</button></td></tr>'
            })
        }

        async function agregarReserva(){
            try{var j=JSON.parse(document.getElementById('jsonReserva').value);R.push(j);window._shaR=await ghWrite('reservas.json',R,window._shaR,'Agregar: '+j.id);renderReservas();document.getElementById('jsonReserva').value='';N('✅ Agregada','success')}catch(e){N('Error: '+e.message,'error')}
        }

        async function cambiarEstadoR(i){R[i].estadoPago=R[i].estadoPago==='pagado'?'pendiente':'pagado';window._shaR=await ghWrite('reservas.json',R,window._shaR,'Estado');renderReservas()}
        async function eliminarR(i){R.splice(i,1);window._shaR=await ghWrite('reservas.json',R,window._shaR,'Eliminar');renderReservas();N('🗑️ Eliminada','success')}
        async function cargarReservas(){var r=await ghRead('reservas.json');R=r.data;window._shaR=r.sha;renderReservas()}

        // PRODUCTOS
        function llenarSelectVendedores(){
            var sel=document.getElementById('prodVendedor');sel.innerHTML='';
            V.forEach(function(v){sel.innerHTML+='<option value="'+v.id+'">'+v.nombre+'</option>'})
        }

        function renderProductos(){
            var tb=document.getElementById('tbodyProductos');tb.innerHTML='';
            P.forEach(function(p,i){
                tb.innerHTML+='<tr><td><code>'+p.id+'</code></td><td>'+p.nombre+'</td><td>'+p.categoria+'</td><td>'+p.precio+'</td><td>'+p.vendedor+'</td><td>'+(p.activo?'✅':'❌')+'</td><td>'+
                    '<button class="btn btn-yellow btn-sm" onclick="toggleP('+i+')">'+(p.activo?'Desactivar':'Activar')+'</button> '+
                    '<button class="btn btn-del btn-sm" onclick="eliminarP('+i+')">🗑️</button></td></tr>'
            })
        }

        async function agregarProducto(){
            var p={
                id:'PROD-'+Date.now().toString(36).toUpperCase(),
                nombre:document.getElementById('prodNombre').value,
                categoria:document.getElementById('prodCategoria').value,
                descripcion:document.getElementById('prodDescripcion').value,
                precio:document.getElementById('prodPrecio').value,
                vendedor:document.getElementById('prodVendedor').value,
                fecha:new Date().toISOString(),
                activo:true
            };
            P.push(p);window._shaP=await ghWrite('productos.json',P,window._shaP,'Agregar: '+p.id);renderProductos();N('✅ Agregado','success')
        }

        async function toggleP(i){P[i].activo=!P[i].activo;window._shaP=await ghWrite('productos.json',P,window._shaP,'Toggle');renderProductos()}
        async function eliminarP(i){P.splice(i,1);window._shaP=await ghWrite('productos.json',P,window._shaP,'Eliminar');renderProductos();N('🗑️ Eliminado','success')}
        async function cargarProductos(){var r=await ghRead('productos.json');P=r.data;window._shaP=r.sha;renderProductos()}

        // VENDEDORES
        function renderVendedores(){
            var tb=document.getElementById('tbodyVendedores');tb.innerHTML='';
            V.forEach(function(v,i){
                tb.innerHTML+='<tr><td><code>'+v.id+'</code></td><td>'+v.avatar+'</td><td>'+v.nombre+'</td><td>★ '+v.valoracion+'</td><td><button class="btn btn-del btn-sm" onclick="eliminarV('+i+')">🗑️</button></td></tr>'
            })
        }

        async function agregarVendedor(){
            var v={
                id:'USR-'+Date.now().toString(36).toUpperCase(),
                nombre:document.getElementById('venNombre').value,
                avatar:document.getElementById('venAvatar').value,
                valoracion:parseFloat(document.getElementById('venValoracion').value)||4.5,
                ventas:Math.floor(Math.random()*200)+50,
                descripcion:document.getElementById('venDescripcion').value
            };
            V.push(v);window._shaV=await ghWrite('vendedores.json',V,window._shaV,'Agregar: '+v.id);renderVendedores();llenarSelectVendedores();N('✅ Agregado','success')
        }

        async function eliminarV(i){V.splice(i,1);window._shaV=await ghWrite('vendedores.json',V,window._shaV,'Eliminar');renderVendedores();llenarSelectVendedores();N('🗑️ Eliminado','success')}
        async function cargarVendedores(){var r=await ghRead('vendedores.json');V=r.data;window._shaV=r.sha;renderVendedores();llenarSelectVendedores()}

        // REPORTES
        function renderReportes(){
            var tb=document.getElementById('tbodyReportes');tb.innerHTML='';
            if(!RP.length){tb.innerHTML='<tr><td colspan="7">Vacío</td></tr>';return}
            [].concat(RP).reverse().forEach(function(r,i){
                var ri=RP.indexOf(r);
                tb.innerHTML+='<tr><td><code>'+r.id+'</code></td><td>'+new Date(r.fecha).toLocaleDateString()+'</td><td>'+(r.idReserva||'-')+'</td><td>'+r.nombre+'</td><td>'+r.tipo+'</td><td><span class="badge badge-pendiente">'+r.estado+'</span></td><td><button class="btn btn-del btn-sm" onclick="eliminarRP('+ri+')">🗑️</button></td></tr>'
            })
        }

        async function agregarReporte(){
            try{var j=JSON.parse(document.getElementById('jsonReporte').value);RP.push(j);window._shaRP=await ghWrite('reportes.json',RP,window._shaRP,'Agregar: '+j.id);renderReportes();document.getElementById('jsonReporte').value='';N('✅ Agregado','success')}catch(e){N('Error: '+e.message,'error')}
        }

        async function eliminarRP(i){RP.splice(i,1);window._shaRP=await ghWrite('reportes.json',RP,window._shaRP,'Eliminar');renderReportes();N('🗑️ Eliminado','success')}
        async function cargarReportes(){var r=await ghRead('reportes.json');RP=r.data;window._shaRP=r.sha;renderReportes()}
    </script>
</body>
</html>
