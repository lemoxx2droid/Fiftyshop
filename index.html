<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiftyshop - Catálogo</title>
    <style>
        :root{--bg:#0a0a0a;--bg2:#1a1a1a;--bg3:#1e1e1e;--red:#8b0000;--red2:#b30000;--red3:#e60000;--tx:#e0e0e0;--tx2:#b0b0b0;--tx3:#808080;--bd:#2a0000;--inp:#111;--inpb:#3a0000;--ok:#0c6;--warn:#fa0}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);background-image:radial-gradient(ellipse at center,rgba(139,0,0,0.06) 0%,transparent 70%);color:var(--tx);min-height:100vh}
        .nav-top{background:var(--bg2);border-bottom:1px solid var(--bd);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
        .nav-top .logo-text{font-size:1.5em;font-weight:900;letter-spacing:3px;background:linear-gradient(180deg,#ff1a1a 0%,#b30000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:'Georgia',serif}
        .nav-links{display:flex;gap:12px;flex-wrap:wrap}
        .nav-links a{color:var(--tx2);text-decoration:none;padding:8px 16px;border-radius:6px;font-size:.85em;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:all .3s;border:1px solid transparent}
        .nav-links a:hover,.nav-links a.active{color:var(--red3);border-color:var(--red);background:rgba(139,0,0,0.1)}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        .hero{text-align:center;padding:40px 20px;margin-bottom:30px}
        .hero h1{font-size:2.5em;font-weight:900;letter-spacing:3px;margin-bottom:10px}
        .hero h1 span{background:linear-gradient(180deg,#ff1a1a 0%,#b30000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hero p{color:var(--tx3);font-size:1em;letter-spacing:1px}
        .hero .line{width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--red2),transparent);margin:15px auto}
        .categorias{display:flex;gap:10px;margin-bottom:25px;flex-wrap:wrap;justify-content:center}
        .cat-btn{padding:10px 20px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;color:var(--tx2);cursor:pointer;font-size:.8em;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:all .3s}
        .cat-btn.active,.cat-btn:hover{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 15px rgba(139,0,0,0.3)}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .producto-card{background:var(--bg3);border:1px solid var(--bd);border-radius:14px;overflow:hidden;transition:all .3s;cursor:pointer;position:relative}
        .producto-card:hover{border-color:var(--red);box-shadow:0 0 25px rgba(139,0,0,0.3);transform:translateY(-4px)}
        .producto-card .card-header{padding:20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
        .producto-card .categoria-badge{padding:4px 10px;border-radius:12px;font-size:.65em;font-weight:700;text-transform:uppercase;letter-spacing:1px}
        .badge-receta{background:rgba(255,170,0,0.2);color:#fa0}
        .badge-metodo{background:rgba(0,180,255,0.2);color:#0af}
        .badge-producto{background:rgba(0,204,102,0.2);color:#0c6}
        .producto-card .vendedor-avatar{font-size:2em}
        .producto-card .card-body{padding:20px}
        .producto-card .card-body h3{font-size:1.1em;margin-bottom:8px;color:var(--tx);letter-spacing:1px}
        .producto-card .card-body p{font-size:.8em;color:var(--tx3);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .producto-card .card-footer{padding:15px 20px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
        .producto-card .precio{font-size:1.3em;font-weight:900;color:var(--red3)}
        .producto-card .vendedor-info{display:flex;align-items:center;gap:8px}
        .producto-card .vendedor-nombre{font-size:.75em;color:var(--tx2)}
        .producto-card .vendedor-stars{color:#fa0;font-size:.75em}
        .btn-preorden{display:inline-block;padding:8px 16px;background:linear-gradient(180deg,#c00,#8b0000);color:#fff;text-decoration:none;border-radius:6px;font-size:.75em;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .3s}
        .btn-preorden:hover{background:linear-gradient(180deg,#e60000,#a30000);box-shadow:0 0 15px rgba(179,0,0,0.5)}
        .footer{text-align:center;padding:30px;color:var(--tx3);font-size:.75em;border-top:1px solid var(--bd);margin-top:40px}
        .footer a{color:var(--red3);text-decoration:none}
        @media(max-width:768px){.hero h1{font-size:1.8em}.grid{grid-template-columns:1fr}.nav-links a{font-size:.7em;padding:6px 10px}}
    </style>
</head>
<body>
    <nav class="nav-top">
        <div class="logo-text">FIFTYS HOP</div>
        <div class="nav-links">
            <a href="index.html" class="active">Catálogo</a>
            <a href="preorden.html">Preordenar</a>
            <a href="reporte.html">Reportar</a>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>Bienvenido a <span>FIFTYS HOP</span></h1>
            <p>Recetas, Métodos y Productos Exclusivos</p>
            <div class="line"></div>
        </div>

        <div class="categorias">
            <button class="cat-btn active" onclick="filtrar('todas')">Todas</button>
            <button class="cat-btn" onclick="filtrar('receta')">Recetas</button>
            <button class="cat-btn" onclick="filtrar('metodo')">Métodos</button>
            <button class="cat-btn" onclick="filtrar('producto')">Productos</button>
        </div>

        <div class="grid" id="gridProductos"></div>
    </div>

    <div class="footer">
        <p>© 2026 Fiftyshop. Todos los productos son publicados por vendedores independientes.</p>
        <p>¿Problemas con tu pedido? <a href="reporte.html">Reportar aquí</a></p>
    </div>

    <script>
        var productos=[],vendedores=[];

        async function cargarDatos(){
            try{
                var p=await fetch('./productos.json');
                productos=await p.json();
                var v=await fetch('./vendedores.json');
                vendedores=await v.json();
                renderizar('todas')
            }catch(e){console.error(e)}
        }

        function getVendedor(id){return vendedores.find(function(v){return v.id===id})||{nombre:'Desconocido',avatar:'👤',valoracion:0}}

        function renderizar(cat){
            var grid=document.getElementById('gridProductos');
            var filtrados=cat==='todas'?productos:productos.filter(function(p){return p.categoria===cat});
            grid.innerHTML='';
            if(!filtrados.length){grid.innerHTML='<div style="text-align:center;padding:40px;color:var(--tx3)">No hay productos en esta categoría.</div>';return}
            filtrados.forEach(function(p){
                var v=getVendedor(p.vendedor);
                var badge=p.categoria==='receta'?'badge-receta':p.categoria==='metodo'?'badge-metodo':'badge-producto';
                var card=document.createElement('div');
                card.className='producto-card';
                card.innerHTML=
                    '<div class="card-header">'+
                        '<span class="categoria-badge '+badge+'">'+p.categoria+'</span>'+
                        '<span class="vendedor-avatar">'+v.avatar+'</span>'+
                    '</div>'+
                    '<div class="card-body">'+
                        '<h3>'+p.nombre+'</h3>'+
                        '<p>'+p.descripcion+'</p>'+
                    '</div>'+
                    '<div class="card-footer">'+
                        '<span class="precio">'+p.precio+'</span>'+
                        '<div style="text-align:right">'+
                            '<div class="vendedor-info">'+
                                '<span class="vendedor-nombre">'+v.nombre+'</span>'+
                                '<span class="vendedor-stars">★ '+v.valoracion+'</span>'+
                            '</div>'+
                            '<a href="preorden.html?prod='+p.id+'" class="btn-preorden">Preordenar</a>'+
                        '</div>'+
                    '</div>';
                grid.appendChild(card)
            })
        }

        function filtrar(cat){
            document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active')});
            event.target.classList.add('active');
            renderizar(cat)
        }

        cargarDatos();
    </script>
</body>
</html>
