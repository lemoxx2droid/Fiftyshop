<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiftyshop - Reservas</title>
    <style>
        :root{--bg:#0a0a0a;--bg2:#1a1a1a;--bg3:#1e1e1e;--red:#8b0000;--red2:#b30000;--red3:#e60000;--tx:#e0e0e0;--tx2:#b0b0b0;--tx3:#808080;--bd:#2a0000;--inp:#111;--inpb:#3a0000;--ok:#0c6}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);background-image:radial-gradient(ellipse at center,rgba(139,0,0,0.08) 0%,transparent 70%);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
        .container{width:100%;max-width:520px;margin:0 auto}
        .logo{text-align:center;margin-bottom:10px;padding:20px 0}
        .logo h1{font-size:3em;font-weight:900;letter-spacing:4px;background:linear-gradient(180deg,#ff1a1a 0%,#b30000 30%,#660000 60%,#330000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 25px rgba(179,0,0,0.7));font-family:'Georgia',serif}
        .logo .subtitle{font-size:.85em;color:var(--tx3);letter-spacing:6px;margin-top:2px;text-transform:uppercase}
        .logo .line{width:100px;height:2px;background:linear-gradient(90deg,transparent,var(--red2),transparent);margin:12px auto}
        .nav-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border-radius:12px;padding:5px;border:1px solid var(--bd)}
        .nav-tab{flex:1;padding:12px 16px;border:none;background:transparent;color:var(--tx2);font-size:.9em;font-weight:600;cursor:pointer;border-radius:8px;transition:all .3s;letter-spacing:1px;text-transform:uppercase}
        .nav-tab.active{background:var(--red);color:#fff;box-shadow:0 0 20px rgba(139,0,0,0.3)}
        .card{background:var(--bg3);border:1px solid var(--bd);border-radius:16px;padding:30px;box-shadow:0 0 20px rgba(139,0,0,0.3);position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red2),var(--red3),var(--red2),transparent)}
        .section-title{font-size:1.2em;font-weight:700;margin-bottom:20px;text-align:center;text-transform:uppercase;letter-spacing:2px}
        .section-title span{color:var(--red3)}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;margin-bottom:6px;font-size:.8em;font-weight:600;color:var(--tx2);letter-spacing:1px;text-transform:uppercase}
        .form-group label .optional{color:var(--tx3);font-weight:400;font-size:.85em}
        .form-group input,.form-group textarea{width:100%;padding:12px 16px;background:var(--inp);border:1.5px solid var(--inpb);border-radius:8px;color:var(--tx);font-size:.95em;transition:all .3s;outline:none;font-family:inherit}
        .form-group input:focus,.form-group textarea:focus{border-color:var(--red);box-shadow:0 0 15px rgba(139,0,0,0.4),inset 0 0 10px rgba(139,0,0,0.1);background:#1a0a0a}
        .form-group textarea{resize:vertical;min-height:80px;max-height:150px}
        .info-text{font-size:.75em;color:var(--tx3);margin-top:4px;display:flex;align-items:center;gap:6px}
        .info-text .icon{color:var(--red3)}
        .privacy-notice{background:rgba(139,0,0,0.1);border:1px solid rgba(139,0,0,0.3);border-radius:10px;padding:14px 16px;margin:20px 0;font-size:.78em;color:var(--tx3);text-align:center;line-height:1.5}
        .btn-submit{width:100%;padding:14px;background:linear-gradient(180deg,#c00 0%,#8b0000 100%);border:none;border-radius:10px;color:#fff;font-size:1em;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(139,0,0,0.4)}
        .btn-submit:hover{background:linear-gradient(180deg,#e60000 0%,#a30000 100%);box-shadow:0 6px 30px rgba(179,0,0,0.6);transform:translateY(-2px)}
        .btn-submit:disabled{background:#333;cursor:not-allowed;box-shadow:none;color:#666}
        .notification{display:none;padding:16px;border-radius:10px;margin-top:16px;text-align:center;font-weight:600;animation:fadeIn .4s}
        .notification.success{display:block;background:rgba(0,204,102,0.15);border:1px solid rgba(0,204,102,0.4);color:#0c6}
        .notification.error{display:block;background:rgba(230,0,0,0.15);border:1px solid rgba(230,0,0,0.4);color:#e60000}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .loading{animation:pulse 1.5s infinite}
        .copy-area{background:var(--inp);border:1px solid var(--inpb);border-radius:8px;padding:12px;margin-top:10px;color:var(--tx2);font-size:.8em;font-family:monospace;word-break:break-all;max-height:200px;overflow-y:auto;display:none}
        .btn-copy{width:100%;padding:10px;background:var(--bg2);border:1px solid var(--ok);border-radius:8px;color:var(--ok);font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:1px;text-transform:uppercase;font-size:.8em;display:none}
        .btn-copy:hover{background:rgba(0,204,102,0.1)}
        .status-container{text-align:center;padding:10px 0}
        .status-icon{font-size:3em;margin-bottom:10px}
        .status-icon.pending{color:#fa0;animation:pulse 2s infinite}
        .status-icon.paid{color:#0c6}
        .status-message{font-size:1em;color:var(--tx2);line-height:1.6}
        .status-message .highlight{color:var(--red3);font-weight:700}
        .check-status-btn{width:100%;padding:14px;background:var(--bg2);border:1.5px solid var(--inpb);border-radius:10px;color:var(--tx);font-size:.95em;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .3s;text-transform:uppercase;margin-top:10px}
        .check-status-btn:hover{border-color:var(--red);box-shadow:0 0 20px rgba(139,0,0,0.3);background:rgba(139,0,0,0.15)}
        .hidden{display:none}
        @media(max-width:480px){.card{padding:20px 16px}.logo h1{font-size:2.2em}}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>FIFTYS HOP</h1>
            <p class="subtitle">Reservas Exclusivas</p>
            <div class="line"></div>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('reserva')">Nueva Reserva</button>
            <button class="nav-tab" onclick="switchTab('estado')">Estado de Pago</button>
        </div>
        <div class="card" id="tab-reserva">
            <h3 class="section-title"><span>◆</span> Formulario de Reserva <span>◆</span></h3>
            <form id="reservaForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>Nombre Completo <span class="optional">(puede ser un alias)</span></label>
                    <input type="text" id="nombre" placeholder="Ingresa tu nombre o alias..." required>
                    <p class="info-text"><span class="icon">ℹ</span> No es necesario usar tu nombre real.</p>
                </div>
                <div class="form-group">
                    <label>Número de Teléfono</label>
                    <input type="tel" id="telefono" placeholder="+52 1 234 567 8901" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="tucorreo@email.com" required>
                </div>
                <div class="form-group">
                    <label>Dirección de Envío</label>
                    <textarea id="direccion" placeholder="Calle, número, colonia, ciudad, estado, código postal..." required></textarea>
                </div>
                <div class="privacy-notice">🔒 Todos los datos están protegidos. No hay fuga de información.</div>
                <button type="submit" class="btn-submit" id="submitBtn">Enviar Datos de Reserva</button>
            </form>
            <div class="copy-area" id="copyArea"></div>
            <button class="btn-copy" id="btnCopy" onclick="copiarJSON()">📋 Copiar JSON para Admin</button>
            <div id="notification" class="notification"></div>
        </div>
        <div class="card hidden" id="tab-estado">
            <h3 class="section-title"><span>◆</span> Verificar Estado de Pago <span>◆</span></h3>
            <div class="form-group">
                <label>Número de Teléfono Registrado</label>
                <input type="tel" id="telConsulta" placeholder="Ingresa el teléfono de tu reserva..." required>
            </div>
            <button class="check-status-btn" onclick="consultarEstado()">🔍 Consultar Estado</button>
            <div id="estadoResultado" style="margin-top:20px">
                <div class="status-container" id="statusDisplay" style="display:none">
                    <div class="status-icon pending" id="statusIcon">⏳</div>
                    <div class="status-message" id="statusMessage"></div>
                </div>
            </div>
            <div id="notificationEstado" class="notification"></div>
        </div>
    </div>
    <script>
        var TK='8904805084:AAGUj2dSJfFVmCPExt4Tt-kFSSGUpLEPp6E';
        var CID='7353460594';
        var ultimoJSON='';

        function switchTab(t){document.getElementById('tab-reserva').classList.toggle('hidden',t!=='reserva');document.getElementById('tab-estado').classList.toggle('hidden',t!=='estado');document.querySelectorAll('.nav-tab').forEach(function(b,i){b.classList.toggle('active',(i===0&&t==='reserva')||(i===1&&t==='estado'))});document.getElementById('notification').className='notification';document.getElementById('notificationEstado').className='notification'}
        function showNotification(m,ty,tg){var n=document.getElementById(tg||'notification');n.textContent=m;n.className='notification '+ty;setTimeout(function(){n.className='notification'},8000)}

        async function obtenerReservas(){try{var r=await fetch('./reservas.json');if(!r.ok)throw new Error('No se pudo leer');return await r.json()}catch(e){return[]}}

        async function enviarATelegram(datos){
            var msg='🔴 *NUEVA RESERVA - FIFTYSHOP* 🔴\n\n'+
                '🆔 *ID:* `'+datos.id+'`\n'+
                '📅 *Fecha:* '+new Date(datos.fecha).toLocaleString('es-MX')+'\n\n'+
                '👤 *Nombre:* '+datos.nombre+'\n'+
                '📱 *Teléfono:* '+datos.telefono+'\n'+
                '📧 *Correo:* '+datos.correo+'\n'+
                '📍 *Dirección:* '+datos.direccion+'\n\n'+
                '💳 *Estado:* PENDIENTE ⏳\n\n'+
                '```json\n'+JSON.stringify(datos,null,2)+'\n```';
            try{
                var r=await fetch('https://api.telegram.org/bot'+TK+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CID,text:msg,parse_mode:'Markdown'})});
                var j=await r.json();
                return j.ok
            }catch(e){return false}
        }

        function copiarJSON(){
            if(!ultimoJSON)return;
            navigator.clipboard.writeText(ultimoJSON).then(function(){
                showNotification('✅ JSON copiado al portapapeles. Pégalo en admin.html','success')
            }).catch(function(){
                var ca=document.getElementById('copyArea');
                ca.style.display='block';
                ca.textContent=ultimoJSON;
                var range=document.createRange();
                range.selectNode(ca);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                showNotification('📋 Selecciona el texto y cópialo manualmente','success')
            })
        }

        async function handleSubmit(e){
            e.preventDefault();
            var btn=document.getElementById('submitBtn');
            var orig=btn.textContent;
            btn.disabled=true;btn.textContent='ENVIANDO...';btn.classList.add('loading');
            var datos={
                nombre:document.getElementById('nombre').value.trim(),
                telefono:document.getElementById('telefono').value.trim(),
                correo:document.getElementById('correo').value.trim(),
                direccion:document.getElementById('direccion').value.trim(),
                id:'RES-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substring(2,6).toUpperCase(),
                fecha:new Date().toISOString(),
                estadoPago:'pendiente'
            };
            ultimoJSON=JSON.stringify(datos);
            var enviado=await enviarATelegram(datos);
            if(enviado){showNotification('✅ Reserva enviada a Telegram. Copia el JSON para el admin.','success')}
            else{showNotification('⚠️ No se pudo enviar a Telegram pero el JSON está listo.','error')}
            document.getElementById('copyArea').style.display='block';
            document.getElementById('copyArea').textContent=ultimoJSON;
            document.getElementById('btnCopy').style.display='block';
            document.getElementById('reservaForm').reset();
            btn.disabled=false;btn.textContent=orig;btn.classList.remove('loading')
        }

        async function consultarEstado(){
            var tel=document.getElementById('telConsulta').value.trim();
            var sd=document.getElementById('statusDisplay');
            var si=document.getElementById('statusIcon');
            var sm=document.getElementById('statusMessage');
            document.getElementById('notificationEstado').className='notification';
            if(!tel){showNotification('Ingresa un número de teléfono.','error','notificationEstado');sd.style.display='none';return}
            var reservas=await obtenerReservas();
            if(reservas.length===0){showNotification('No hay reservas registradas aún.','error','notificationEstado');sd.style.display='none';return}
            var res=reservas.filter(function(r){return r.telefono===tel}).sort(function(a,b){return new Date(b.fecha)-new Date(a.fecha)})[0];
            if(!res){sd.style.display='block';si.textContent='❓';si.className='status-icon';sm.innerHTML='No se encontró reserva con ese teléfono.';return}
            sd.style.display='block';
            if(res.estadoPago==='pagado'){si.textContent='✅';si.className='status-icon paid';sm.innerHTML='<strong>Reserva:</strong> <span class="highlight">'+res.id+'</span><br><strong>Estado:</strong> <span style="color:#00cc66;font-weight:700;">PAGO RECIBIDO ✅</span><br><br>Tu pedido está siendo procesado.'}
            else{si.textContent='⏳';si.className='status-icon pending';sm.innerHTML='<strong>Reserva:</strong> <span class="highlight">'+res.id+'</span><br><strong>Estado:</strong> <span style="color:#ffaa00;font-weight:700;">A LA ESPERA DE PAGO ⏳</span><br><br>Realiza el pago para continuar.'}
        }
    </script>
</body>
</html>
