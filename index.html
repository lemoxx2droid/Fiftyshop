<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiftyshop - Reservas</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --red-dark: #8b0000;
            --red-blood: #b30000;
            --red-bright: #e60000;
            --red-glow: #ff1a1a;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border: #2a0000;
            --input-bg: #111111;
            --input-border: #3a0000;
            --input-focus: #8b0000;
            --success: #00cc66;
            --button-hover: #cc0000;
            --shadow-red: 0 0 20px rgba(139, 0, 0, 0.3);
            --shadow-glow: 0 0 30px rgba(179, 0, 0, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            background-image: radial-gradient(ellipse at center, rgba(139,0,0,0.08) 0%, transparent 70%), radial-gradient(ellipse at top left, rgba(179,0,0,0.05) 0%, transparent 50%), radial-gradient(ellipse at bottom right, rgba(255,26,26,0.03) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 520px; margin: 0 auto; }
        .logo { text-align: center; margin-bottom: 10px; padding: 20px 0; }
        .logo h1 { font-size: 3em; font-weight: 900; letter-spacing: 4px; background: linear-gradient(180deg, #ff1a1a 0%, #b30000 30%, #660000 60%, #330000 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 25px rgba(179,0,0,0.7)); font-family: 'Georgia', serif; }
        .logo .subtitle { font-size: 0.85em; color: var(--text-muted); letter-spacing: 6px; margin-top: 2px; text-transform: uppercase; }
        .logo .line { width: 100px; height: 2px; background: linear-gradient(90deg, transparent, var(--red-blood), transparent); margin: 12px auto; }
        .nav-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg-secondary); border-radius: 12px; padding: 5px; border: 1px solid var(--border); }
        .nav-tab { flex: 1; padding: 12px 16px; border: none; background: transparent; color: var(--text-secondary); font-size: 0.9em; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.3s ease; letter-spacing: 1px; text-transform: uppercase; }
        .nav-tab.active { background: var(--red-dark); color: #ffffff; box-shadow: var(--shadow-red); }
        .nav-tab:hover:not(.active) { background: rgba(139,0,0,0.3); color: var(--text-primary); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 30px; box-shadow: var(--shadow-red); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--red-blood), var(--red-bright), var(--red-blood), transparent); }
        .section-title { font-size: 1.2em; font-weight: 700; margin-bottom: 20px; color: var(--text-primary); letter-spacing: 2px; text-align: center; text-transform: uppercase; }
        .section-title span { color: var(--red-bright); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.8em; font-weight: 600; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }
        .form-group label .optional { color: var(--text-muted); font-weight: 400; font-size: 0.85em; text-transform: none; letter-spacing: 0; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1.5px solid var(--input-border); border-radius: 8px; color: var(--text-primary); font-size: 0.95em; transition: all 0.3s ease; outline: none; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--red-dark); box-shadow: 0 0 15px rgba(139,0,0,0.4), inset 0 0 10px rgba(139,0,0,0.1); background: #1a0a0a; }
        .form-group textarea { resize: vertical; min-height: 80px; max-height: 150px; }
        .info-text { font-size: 0.75em; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
        .info-text .icon { color: var(--red-bright); font-size: 0.9em; }
        .privacy-notice { background: rgba(139,0,0,0.1); border: 1px solid rgba(139,0,0,0.3); border-radius: 10px; padding: 14px 16px; margin: 20px 0; font-size: 0.78em; color: var(--text-muted); text-align: center; line-height: 1.5; }
        .privacy-notice .lock-icon { color: var(--red-bright); font-size: 1.2em; vertical-align: middle; margin-right: 4px; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(180deg, #cc0000 0%, #8b0000 100%); border: none; border-radius: 10px; color: #ffffff; font-size: 1em; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(139,0,0,0.4); position: relative; overflow: hidden; }
        .btn-submit:hover { background: linear-gradient(180deg, #e60000 0%, #a30000 100%); box-shadow: 0 6px 30px rgba(179,0,0,0.6); transform: translateY(-2px); }
        .btn-submit:active { transform: translateY(0); box-shadow: 0 2px 10px rgba(139,0,0,0.3); }
        .btn-submit:disabled { background: #333; cursor: not-allowed; box-shadow: none; color: #666; }
        .notification { display: none; padding: 16px; border-radius: 10px; margin-top: 16px; text-align: center; font-weight: 600; letter-spacing: 0.5px; animation: fadeIn 0.4s ease; }
        .notification.success { display: block; background: rgba(0,204,102,0.15); border: 1px solid rgba(0,204,102,0.4); color: #00cc66; }
        .notification.error { display: block; background: rgba(230,0,0,0.15); border: 1px solid rgba(230,0,0,0.4); color: #e60000; }
        .notification.info { display: block; background: rgba(255,170,0,0.15); border: 1px solid rgba(255,170,0,0.4); color: #ffaa00; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading { animation: pulse 1.5s infinite; }
        .status-container { text-align: center; padding: 10px 0; }
        .status-icon { font-size: 3em; margin-bottom: 10px; }
        .status-icon.pending { color: #ffaa00; animation: pulse 2s infinite; }
        .status-icon.paid { color: #00cc66; }
        .status-message { font-size: 1em; color: var(--text-secondary); line-height: 1.6; }
        .status-message .highlight { color: var(--red-bright); font-weight: 700; }
        .check-status-btn { width: 100%; padding: 14px; background: var(--bg-secondary); border: 1.5px solid var(--input-border); border-radius: 10px; color: var(--text-primary); font-size: 0.95em; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; margin-top: 10px; }
        .check-status-btn:hover { border-color: var(--red-dark); box-shadow: var(--shadow-red); background: rgba(139,0,0,0.15); }
        .hidden { display: none; }
        @media (max-width: 480px) { .card { padding: 20px 16px; } .logo h1 { font-size: 2.2em; } .nav-tab { font-size: 0.75em; padding: 10px 8px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>FIFTYS HOP</h1>
            <p class="subtitle">Reservas Exclusivas</p>
            <div class="line"></div>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('reserva')">Nueva Reserva</button>
            <button class="nav-tab" onclick="switchTab('estado')">Estado de Pago</button>
        </div>
        <div class="card" id="tab-reserva">
            <h3 class="section-title"><span>◆</span> Formulario de Reserva <span>◆</span></h3>
            <form id="reservaForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>Nombre Completo <span class="optional">(puede ser un alias)</span></label>
                    <input type="text" id="nombre" placeholder="Ingresa tu nombre o alias..." required>
                    <p class="info-text"><span class="icon">ℹ</span> No es necesario usar tu nombre real.</p>
                </div>
                <div class="form-group">
                    <label>Número de Teléfono</label>
                    <input type="tel" id="telefono" placeholder="+52 1 234 567 8901" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="tucorreo@email.com" required>
                </div>
                <div class="form-group">
                    <label>Dirección de Envío</label>
                    <textarea id="direccion" placeholder="Calle, número, colonia, ciudad, estado, código postal..." required></textarea>
                </div>
                <div class="privacy-notice">
                    <span class="lock-icon">🔒</span> Todos los datos están protegidos. No hay fuga de información. Tus datos son confidenciales.
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Enviar Datos de Reserva</button>
            </form>
            <div id="notification" class="notification"></div>
        </div>
        <div class="card hidden" id="tab-estado">
            <h3 class="section-title"><span>◆</span> Verificar Estado de Pago <span>◆</span></h3>
            <div class="form-group">
                <label>Número de Teléfono Registrado</label>
                <input type="tel" id="telConsulta" placeholder="Ingresa el teléfono de tu reserva..." required>
            </div>
            <button class="check-status-btn" onclick="consultarEstado()">🔍 Consultar Estado</button>
            <div id="estadoResultado" style="margin-top: 20px;">
                <div class="status-container" id="statusDisplay" style="display: none;">
                    <div class="status-icon pending" id="statusIcon">⏳</div>
                    <div class="status-message" id="statusMessage"></div>
                </div>
            </div>
            <div id="notificationEstado" class="notification"></div>
        </div>
    </div>
    <script>
        const JSON_URL = './reservas.json';
        const TELEGRAM_BOT_TOKEN = '8904805084:AAGUj2dSJfFVmCPExt4Tt-kFSSGUpLEPp6E';
        const TELEGRAM_CHAT_ID = '7353460594';

        function switchTab(tab) {
            document.getElementById('tab-reserva').classList.toggle('hidden', tab !== 'reserva');
            document.getElementById('tab-estado').classList.toggle('hidden', tab !== 'estado');
            document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'reserva') || (i === 1 && tab === 'estado')));
            document.getElementById('notification').className = 'notification';
            document.getElementById('notificationEstado').className = 'notification';
        }

        function showNotification(message, type, target = 'notification') {
            const notif = document.getElementById(target);
            notif.textContent = message;
            notif.className = `notification ${type}`;
            setTimeout(() => { notif.className = 'notification'; }, 6000);
        }

        async function obtenerReservas() {
            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) throw new Error('No se pudo leer reservas.json');
                return await response.json();
            } catch (error) {
                console.error('Error al obtener reservas:', error);
                return [];
            }
        }

        async function enviarATelegram(datos) {
            const mensaje = `🔴 *NUEVA RESERVA - FIFTYSHOP* 🔴\n\n` +
                `🆔 *ID:* \`${datos.id}\`\n📅 *Fecha:* ${new Date(datos.fecha).toLocaleString('es-MX')}\n\n` +
                `👤 *Nombre:* ${datos.nombre}\n📱 *Teléfono:* ${datos.telefono}\n📧 *Correo:* ${datos.correo}\n📍 *Dirección:* ${datos.direccion}\n\n` +
                `💳 *Estado:* PENDIENTE ⏳\n\n_Datos seguros_ 🔒`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'Markdown' })
                });
                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('Error al enviar a Telegram:', error);
                return false;
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'ENVIANDO...';
            submitBtn.classList.add('loading');

            const datos = {
                nombre: document.getElementById('nombre').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                correo: document.getElementById('correo').value.trim(),
                direccion: document.getElementById('direccion').value.trim(),
                id: 'RES-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase(),
                fecha: new Date().toISOString(),
                estadoPago: 'pendiente'
            };

            const enviado = await enviarATelegram(datos);

            if (enviado) {
                showNotification('✅ Datos enviados exitosamente. A la espera de pago.', 'success');
                document.getElementById('reservaForm').reset();
            } else {
                showNotification('⚠️ Error al enviar notificación. Intenta de nuevo.', 'error');
            }

            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            submitBtn.classList.remove('loading');
        }

        async function consultarEstado() {
            const telefono = document.getElementById('telConsulta').value.trim();
            const statusDisplay = document.getElementById('statusDisplay');
            const statusIcon = document.getElementById('statusIcon');
            const statusMessage = document.getElementById('statusMessage');
            document.getElementById('notificationEstado').className = 'notification';

            if (!telefono) {
                showNotification('Ingresa un número de teléfono.', 'error', 'notificationEstado');
                statusDisplay.style.display = 'none';
                return;
            }

            const reservas = await obtenerReservas();
            if (reservas.length === 0) {
                showNotification('No hay reservas registradas.', 'error', 'notificationEstado');
                statusDisplay.style.display = 'none';
                return;
            }

            const reserva = reservas.filter(r => r.telefono === telefono).sort((a, b) => new Date(b.fecha) - new Date(a.fecha))[0];

            if (!reserva) {
                statusDisplay.style.display = 'block';
                statusIcon.textContent = '❓';
                statusIcon.className = 'status-icon';
                statusMessage.innerHTML = 'No se encontró reserva con ese teléfono.';
                return;
            }

            statusDisplay.style.display = 'block';
            if (reserva.estadoPago === 'pagado') {
                statusIcon.textContent = '✅';
                statusIcon.className = 'status-icon paid';
                statusMessage.innerHTML = `<strong>Reserva:</strong> <span class="highlight">${reserva.id}</span><br><strong>Estado:</strong> <span style="color:#00cc66;font-weight:700;">PAGO RECIBIDO ✅</span><br><br>Tu pedido está siendo procesado.`;
            } else {
                statusIcon.textContent = '⏳';
                statusIcon.className = 'status-icon pending';
                statusMessage.innerHTML = `<strong>Reserva:</strong> <span class="highlight">${reserva.id}</span><br><strong>Estado:</strong> <span style="color:#ffaa00;font-weight:700;">A LA ESPERA DE PAGO ⏳</span><br><br>Realiza el pago para continuar.`;
            }
        }
    </script>
</body>
</html>
